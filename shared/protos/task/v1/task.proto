syntax = "proto3";

package task.v1;

import "base/common.proto";

option go_package = "github.com/felipebrito-developer/liverubber/gen/task/v1";
option typescript_package = "task.v1";

message Task {
  string id = 1;
  string title = 2;
  string description = 3;
  bool completed = 4;
  base.Timestamp created_at = 5;
  base.Timestamp updated_at = 6;
}

message CreateTaskRequest {
  string title = 1;
  string description = 2;
}

message UpdateTaskRequest {
  string id = 1;
  string title = 2;
  string description = 3;
  bool completed = 4;
}

message GetTaskRequest {
  string id = 1;
}

message ListTasksRequest {
  int32 page = 1;
  int32 page_size = 2;
}

message ListTasksResponse {
  repeated Task tasks = 1;
  int32 total = 2;
  int32 page = 3;
  int32 page_size = 4;
}

message DeleteTaskRequest {
  string id = 1;
}