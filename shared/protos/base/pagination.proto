syntax = "proto3";

package base;

option go_package = "github.com/felipebrito-developer/liverubber/gen/base";
option typescript_package = "base";

message PaginationRequest {
  int32 page = 1;
  int32 page_size = 2;
}

message PaginationResponse {
  int32 total = 1;
  int32 page = 2;
  int32 page_size = 3;
  int32 total_pages = 4;
}